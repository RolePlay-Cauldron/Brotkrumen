#################
#  Data Storage #
#################

# The desired storage-method for the plugin data.
data:

  # Possible options:
  #
  # |    Flat-file / local database - no extra configuration needed
  # | => SQLite
  #
  # |    Remote databases - requires connection information. You can configure them below in the data section.
  # | => MySQL
  # | => MariaDB
  #
  # A SQLite database is the default storage option.
  storageMethod: 'sqlite'

  # the following options are only relevant for the remote database storage-methods.

  # The prefix for the tables in the database.
  # The plugin will automatically create tables with this prefix if they don't exist yet.
  # In migration scenarios, the plugin will not automatically rename the table-prefix.
  tablePrefix: 'brotkrumen'

  # The default address and port for the database.
  host: 'localhost'
  port: 3306

  # The name of the database to store LoriTime data in
  # The database has to be created manually before the first plugin startup. Rename this value to your database name.
  database: 'minecraft'

  # The credentials for the database.
  user: 'user'
  password: 'pw'

  # These settings apply to the MySQL connection pool.
  # The default values will be suitable for the majority of users.
  # DO NOT change these settings unless you know what you're doing!
  poolSettings:

    # Sets the maximum number of connections to the MySQL database.
    # - The value will determine the maximum number of actual connections to the database.
    # - More information about determining the size of connection pools can be found here:
    #   https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-Sizing
    maximumPoolSize: 10

    # Sets the minimum number of idle connections that the pool will try to maintain.
    # For maximum performance and responsiveness to spike demands, it is recommended to not set
    # this value and instead allow the pool to act as a fixed size connection pool.
    # (set this value to the same as 'maximum-pool-size')
    minimumIdle: 10

    # Sets the maximum amount of time that a connection may remain idle in the pool.
    # The minimum value should be 30 seconds less than any db or infrastructure-imposed connection time limit.
    maximumLifetime: 1800000 # 30 Minutes

    # Controls how often the pool will 'ping' a connection to prevent it from going into timeout.
    # The value should be less than maximum-lifetime and greater than 30000 (30 seconds).
    # Setting the value to zero will disable the keepalive functionality.
    keepAliveTime: 0

    # Controls the maximum number of ms that the plugin will wait for a connection from the pool before timing out.
    connectionTimeout: 5000 # 5 seconds

################
#  Visualizer  #
################

visualizer:

  # Controls the base distance, in blocks, used to decide which graph nodes and edges are visible to a viewer.
  # Larger values can increase the number of active rendered elements.
  viewDistance: 16.0

  # Extends the base view distance, in blocks, so graph elements stay active beyond the immediate view range.
  # The renderer uses viewDistance + spawnDistanceBuffer as the effective spawn radius.
  spawnDistanceBuffer: 16.0

############
# Commands #
############

commands:
  resolve:

    # Maximum distance, in blocks, used to find the player's nearest graph node.
    # At runtime this is clamped to visualizer.viewDistance.
    nearestNodeRadius: 15.0

    # Default visualizer backend used by /bk resolve: particle or block-display.
    visualizerBackend: 'particle'

############
#  Editor  #
############

editor:

  # Default distance, in blocks, between automatically created editor nodes.
  defaultNodeDistance: 10

  # Default placement mode for new editor sessions: auto, preview, or waiting-for-anchor.
  defaultPlacementMode: 'auto'

  # When enabled, continuing after undo requires walking through a node before automatic placement resumes.
  continueRequiresNode: true

  # Temporary editor preview preset selected when a session starts.
  defaultPreset: 'default'
