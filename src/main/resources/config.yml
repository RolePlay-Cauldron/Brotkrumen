################
# Localization #
################

localization:

  # Default locale used for player and console feedback.
  # Format: language tag identifier (examples: en-us, de-de)
  # Custom theme variants are supported and resolved as plain tags.
  defaultLocale: 'en-US'

################
# Data Storage #
################

# The desired storage-method for the plugin data.
data:

  # Possible options:
  #
  # | Flat-file / local database - no extra configuration needed
  # | => SQLite
  #
  # | Remote databases - requires connection information. You can configure them below in the data section.
  # | => MySQL
  # | => MariaDB
  #
  # A SQLite database is the default storage option.
  storageMethod: 'sqlite'

  # the following options are only relevant for the remote database storage-methods.

  # The prefix for the tables in the database.
  # The plugin will automatically create tables with this prefix if they don't exist yet.
  # In migration scenarios, the plugin will not automatically rename the table-prefix.
  tablePrefix: 'brotkrumen'

  # The default address and port for the database.
  host: 'localhost'
  port: 3306

  # The name of the database to store LoriTime data in
  # The database has to be created manually before the first plugin startup. Rename this value to your database name.
  database: 'minecraft'

  # The credentials for the database.
  user: 'user'
  password: 'pw'

  # These settings apply to the MySQL connection pool.
  # The default values will be suitable for the majority of users.
  # DO NOT change these settings unless you know what you're doing!
  poolSettings:

    # Sets the maximum number of connections to the MySQL database.
    # - The value will determine the maximum number of actual connections to the database.
    # - More information about determining the size of connection pools can be found here:
    #   https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-Sizing
    maximumPoolSize: 10

    # Sets the minimum number of idle connections that the pool will try to maintain.
    # For maximum performance and responsiveness to spike demands, it is recommended to not set
    # this value and instead allow the pool to act as a fixed size connection pool.
    # (set this value to the same as 'maximum-pool-size')
    minimumIdle: 10

    # Sets the maximum amount of time that a connection may remain idle in the pool.
    # The minimum value should be 30 seconds less than any db or infrastructure-imposed connection time limit.
    maximumLifetime: 1800000 # 30 Minutes

    # Controls how often the pool will 'ping' a connection to prevent it from going into timeout.
    # The value should be less than maximum-lifetime and greater than 30,000 (30 seconds).
    # Setting the value to zero will disable the keepalive functionality.
    keepAliveTime: 0

    # Controls the maximum number of ms that the plugin will wait for a connection from the pool before timing out.
    connectionTimeout: 5000 # 5 seconds

##############
# Visualizer #
##############

visualizer:

  # Default visualizer renderer for editor previews and /bk resolve.
  # Supported values: spellbookEffect, blockDisplay
  defaultRenderer: 'spellbookEffect'

  # Default preset used when a graph has no usable Spellbook effect preset.
  defaultSpellbookEffectPreset: 'ember'

  # Default preset used when a graph has no usable block-display preset.
  defaultBlockDisplayPreset: 'ember'

  # Controls the base distance, in blocks, used to decide which graph nodes and edges are visible to a viewer.
  # Larger values can increase the number of active rendered elements.
  viewDistance: 16.0

  # Extends the base view distance, in blocks, so graph elements stay active beyond the immediate view range.
  # The renderer uses viewDistance + spawnDistanceBuffer as the effective spawn radius.
  spawnDistanceBuffer: 16.0

  # Guided path visualization settings used by /bk resolve.
  guidedPath:

    # Number of forward path nodes shown from the current progress node.
    windowSize: 4

    # Number of previous path nodes kept visible behind the current progress node.
    # Minimum: 0
    lookBehind: 1

    # Whether previous path nodes remain visible after the final goal node is reached.
    # When disabled, only the goal node remains visible during resolve cleanup.
    keepLookBehindOnCompletion: false

############
# Commands #
############

commands:
  resolve:

    # Maximum distance, in blocks, used to find the player's nearest graph node.
    # At runtime this is clamped to visualizer.viewDistance.
    nearestNodeRadius: 15.0

    # Distance, in blocks, used to detect when guided resolve reached the final path node.
    finishRadius: 4.0

    # Delay, in seconds, before completed guided resolve visualization is removed.
    finishCleanupDelaySeconds: 5

    # Whether guided resolve marks the final selected path node with a dedicated visual role.
    goalMarkerEnabled: true

    # Effects played when guided resolve reaches the final goal node.
    goal:

      # Whether the localized completion chat message is sent.
      message:
        enabled: true

      # Whether a completion sound is played for the target player.
      sound:
        enabled: true
        name: 'entity.player.levelup'
        volume: 1.0
        pitch: 1.0

      # Whether the localized completion title and subtitle are sent.
      title:
        enabled: false
        fadeInTicks: 10
        stayTicks: 40
        fadeOutTicks: 10

    # Cancels guided resolve when the player stays too far away from the visible route.
    cancelWhenAway:

      # Whether guided resolve should cancel after the player leaves the route range.
      enabled: true

      # Distance, in blocks, from current guided path nodes and edges that remains valid.
      distance: 10.0

      # Whether players receive a warning before resolve guidance is cancelled.
      warningEnabled: true

      # Grace period, in seconds, after the warning before resolve guidance is cancelled.
      warningGraceSeconds: 5

    # Default teleport rules for /bk resolve.
    # Supported presets:
    # - DISABLED: No teleportation allowed.
    # - LOCAL_TP_ONLY: Only teleports within the same graph are allowed.
    # - WARPS_ONLY: Only globally callable warps are allowed.
    # - INTERGRAPH_TP_ONLY: Only teleports between different graphs are allowed.
    #
    # Combinations (case-insensitive, can be partial):
    # - LOCAL_INTERGRAPH_TP: Allows both local and inter-graph teleports.
    # - LOCAL_TP_WARP: Allows both local teleports and warps.
    # - INTERGRAPH_WARP: Allows both inter-graph teleports and warps.
    # - LOCAL_INTERGRAPH_WARP: Allows all teleportation types.
    teleportRules: 'LOCAL_INTERGRAPH_WARP'

    # Automatic teleport execution for guided /bk resolve paths.
    # These options only execute teleport-like segments that are already part of the selected path.
    # They do not enable traversal types disabled by teleportRules.
    autoTeleport:

      # Whether guided resolve should automatically execute selected teleport-like path segments.
      enabled: true

      # Delay, in seconds, before an automatic teleport is executed.
      delaySeconds: 3

      # Whether players receive a message before delayed automatic teleports.
      messageEnabled: true

      # Cooldown, in seconds, before another automatic teleport can be triggered.
      cooldownSeconds: 3

      # Whether a delayed teleport is cancelled when the player leaves the source node range.
      cancelWhenPlayerMovesAway: true

      # Distance, in blocks, from the source node where delayed teleports remain valid.
      cancelRange: 5.0

      # Whether local teleport path segments may execute automatically.
      localTeleportEnabled: true

      # Whether inter-graph teleport path segments may execute automatically.
      interGraphTeleportEnabled: true

      # Whether warp path segments may execute automatically.
      warpEnabled: true

      # Whether /bk resolve may start from the cheapest allowed warp target when no node is nearby.
      startFromWarpWhenNoNearbyNode: true

##########
# Editor #
##########

editor:

  # Default distance, in blocks, between automatically created editor nodes.
  defaultNodeDistance: 10

  # Default placement mode for new editor sessions: auto, preview, or waiting-for-anchor.
  defaultPlacementMode: 'auto'

  # Default placement mode when editing an existing graph: auto, preview, or waiting-for-anchor.
  # Preview avoids appending to an existing graph until placement is explicitly resumed.
  defaultEditPlacementMode: 'preview'

  # When enabled, newly placed editor nodes are snapped to the highest block at the player's X/Z position.
  # When disabled, nodes are placed at the player's exact location.
  placeNodesOnGround: false

  # When enabled, continuing after undo requires walking through a node before automatic placement resumes.
  continueRequiresNode: true

  # Temporary editor preview preset selected when a session starts.
  defaultPreset: 'ember'

