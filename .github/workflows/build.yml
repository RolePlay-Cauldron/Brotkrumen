name: Build

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  build:
    name: build all jars
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
          cache: 'maven'
          cache-dependency-path: pom.xml
      - name: Generate build version
        id: build-version
        uses: ./.github/actions/generate-build-version
        with:
          event-name: ${{ github.event_name }}
          ref-name: ${{ github.ref_name }}
          run-number: ${{ github.run_number }}
          default-branch: ${{ github.event.repository.default_branch }}
      - name: Show build version
        run: |
          echo "Building Brotkrumen ${{ steps.build-version.outputs.version }}"
      - name: Activate lf line ending check in editorconfig
        run: |
          find . -type f -name ".editorconfig" -exec sed -i "s~#end_of_line = ~end_of_line = ~g" {} \;
      - name: Build with Maven. Phase 'verify'
        run: |
          mvn verify -Dbrotkrumen.version="${{ steps.build-version.outputs.version }}"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RolePlay-Cauldron-Artifacts
          path: |
            **/target/*.jar
            !config/target/*.jar
